<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="Upcoming and past events of NUBS KNUST" />
  <title>Events & Programs - NUBS KNUST</title>

  <!-- Favicon-->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <!-- Bootstrap Icons-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Core theme CSS (includes Bootstrap)-->
  <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column h-100">
  <main class="flex-shrink-0">
    
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container px-5">
        <a class="navbar-brand fw-bold" href="index.html">NUBS KNUST</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Page Header -->
    <header class="py-5 bg-light border-bottom">
      <div class="container px-5 my-4">
        <div class="text-center">
          <h1 class="fw-bolder display-5 mb-2">Events & Programs</h1>
          <p class="lead fw-normal text-muted mb-0">Stay updated with all upcoming fellowship gatherings, services, and special events</p>
        </div>
      </div>
    </header>

    <!-- Main Events Grid Section -->
    <section class="py-5">
      <div class="container px-5 my-3">
        
        <!-- Updated to use 'events-grid' class for custom card styles -->
        <div id="full-events-container" class="events-grid">
          <div style="grid-column: 1 / -1; text-align: center; padding: 3rem 0;">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading events...</span>
            </div>
            <p class="text-muted mt-2">Fetching upcoming programs...</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="bg-dark py-4 mt-auto">
    <div class="container px-5">
      <div class="row align-items-center justify-content-between flex-column flex-sm-row">
        <div class="col-auto">
          <div class="small m-0 text-white">Copyright &copy; NUBS KNUST 2026</div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap core JS-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core theme JS-->
  <script src="js/scripts.js"></script>
</body>
</html>
