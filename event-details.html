<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .details-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 1rem;
      text-decoration: none;
      color: #374151;
      font-weight: 600;
    }
    .details-banner {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    .details-meta {
      display: flex;
      gap: 2rem;
      color: #4b5563;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <main class="details-container">
    <a href="/events.html" class="back-btn">&larr; Back to Events</a>
    <div id="event-detail-content">Loading event details...</div>
  </main>

  <script>
    async function fetchEventDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const eventId = urlParams.get('id');
      const container = document.getElementById('event-detail-content');

      if (!eventId) {
        container.innerHTML = '<p>Event not found.</p>';
        return;
      }

      try {
        // Fetch all events to locate current selected event
        const response = await fetch('/api/get-events?type=events');
        const data = await response.json();
        const event = data.items.find(item => item.id === eventId);

        if (!event) {
          container.innerHTML = '<p>Event details not available.</p>';
          return;
        }

        container.innerHTML = `
          <img src="${event.imageUrl}" alt="${event.title}" class="details-banner" />
          <h1>${event.title}</h1>
          <div class="details-meta">
            <span>📅 ${event.date}</span>
            <span>📍 ${event.location || 'KNUST Campus'}</span>
          </div>
          <hr />
          <p style="font-size: 1.1rem; line-height: 1.6; color: #374151; margin-top: 1.5rem;">
            ${event.description}
          </p>
        `;
      } catch (err) {
        console.error("Error loading event details:", err);
        container.innerHTML = '<p>Failed to load event details.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', fetchEventDetails);
  </script>
</body>
</html>
